openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Valley API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: documents
    description: Document operations
  - name: user
    description: User operations
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List featured/approved documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"

  /documents/search:
    get:
      operationId: searchDocuments
      tags: [documents]
      summary: Search documents
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [latest, most_viewed]
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /documents/upload:
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a document (multipart/form-data)
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by id or slug
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/download-request:
    post:
      operationId: downloadRequest
      tags: [documents]
      summary: Request a document download
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Download URL granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient credits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get current user profile
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /user/workspace:
    get:
      operationId: getWorkspace
      tags: [user]
      summary: Get user workspace (their documents)
      responses:
        "200":
          description: Workspace data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"

  /user/daily-checkin:
    get:
      operationId: getCheckinStatus
      tags: [user]
      summary: Get today's check-in status
      responses:
        "200":
          description: Check-in status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinStatus"
    post:
      operationId: dailyCheckin
      tags: [user]
      summary: Perform daily check-in
      responses:
        "200":
          description: Check-in successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinResponse"
        "400":
          description: Already checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/pending-documents:
    get:
      operationId: getPendingDocuments
      tags: [admin]
      summary: Get pending documents for review
      responses:
        "200":
          description: Pending documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingDocumentsResponse"

  /admin/documents/{id}/review:
    post:
      operationId: reviewDocument
      tags: [admin]
      summary: Approve or reject a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "200":
          description: Review processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "409":
          description: Already reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getSiteStats
      tags: [documents]
      summary: Get site-level statistics
      responses:
        "200":
          description: Site stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: ["string", "null"]
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    AuthInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    UserInfo:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [Admin, User]
        membershipType:
          type: string
          enum: [Free, Premium]
        credits:
          type: integer
      required: [id, email, role, membershipType, credits]

    AuthResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"
      required: [message, user]

    UserProfile:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserInfo"
      required: [user]

    DocumentSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        totalPages:
          type: integer
        pointsRequired:
          type: integer
        viewCount:
          type: integer
        downloadCount:
          type: integer
        uploaderEmail:
          type: string
      required: [id, title, slug, totalPages, pointsRequired, viewCount, downloadCount, uploaderEmail]

    DocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSummary"
      required: [documents]

    DocSearchResult:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        previewPattern:
          type: ["string", "null"]
        totalPages:
          type: integer
        viewCount:
          type: integer
        downloadCount:
          type: integer
        pointsRequired:
          type: integer
        createdAt:
          type: string
        categoryName:
          type: string
        categorySlug:
          type: string
        uploaderEmail:
          type: string
      required: [id, title, slug, totalPages, viewCount, downloadCount, pointsRequired, createdAt, categoryName, categorySlug, uploaderEmail]

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
      required: [id, name, slug]

    Pagination:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, pageSize, total, totalPages]

    SearchResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocSearchResult"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [documents, categories, pagination]

    DocumentDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        previewPattern:
          type: ["string", "null"]
        totalPages:
          type: integer
        viewCount:
          type: integer
        downloadCount:
          type: integer
        pointsRequired:
          type: integer
        status:
          type: string
        uploaderEmail:
          type: string
        isOwner:
          type: boolean
        isAuthenticated:
          type: boolean
        isPremium:
          type: boolean
      required: [id, title, slug, totalPages, viewCount, downloadCount, pointsRequired, status, uploaderEmail, isOwner, isAuthenticated, isPremium]

    UploadResponse:
      type: object
      properties:
        message:
          type: string
        document:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            status:
              type: string
          required: [id, title, status]
        creditsAwarded:
          type: ["integer", "null"]
      required: [message, document]

    DownloadResponse:
      type: object
      properties:
        message:
          type: string
        downloadUrl:
          type: string
        document:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            pointsRequired:
              type: integer
          required: [id, title, pointsRequired]
      required: [message, downloadUrl, document]

    WorkspaceDocument:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        totalPages:
          type: integer
        pointsRequired:
          type: integer
        viewCount:
          type: integer
        downloadCount:
          type: integer
        status:
          type: string
          enum: [Pending, Approved, Rejected]
        rejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, title, totalPages, pointsRequired, viewCount, downloadCount, status, createdAt]

    WorkspaceResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            email:
              type: string
            credits:
              type: integer
            membershipType:
              type: string
            createdAt:
              type: string
          required: [email, credits, membershipType, createdAt]
        documents:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceDocument"
      required: [user, documents]

    CheckinStatus:
      type: object
      properties:
        checkedInToday:
          type: boolean
      required: [checkedInToday]

    CheckinResponse:
      type: object
      properties:
        message:
          type: string
        newCredits:
          type: integer
        pointsEarned:
          type: integer
      required: [message, newCredits, pointsEarned]

    AdminStats:
      type: object
      properties:
        totalDocuments:
          type: integer
        pendingDocuments:
          type: integer
        approvedDocuments:
          type: integer
        totalUsers:
          type: integer
      required: [totalDocuments, pendingDocuments, approvedDocuments, totalUsers]

    PendingDocument:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        totalPages:
          type: integer
        pointsRequired:
          type: integer
        previewPattern:
          type: ["string", "null"]
        createdAt:
          type: string
        uploaderEmail:
          type: string
      required: [id, title, totalPages, pointsRequired, createdAt, uploaderEmail]

    PendingDocumentsResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/PendingDocument"
      required: [documents]

    ReviewInput:
      type: object
      properties:
        action:
          type: string
          enum: [APPROVE, REJECT]
      required: [action]

    SiteStats:
      type: object
      properties:
        totalDocs:
          type: integer
        totalUsers:
          type: integer
      required: [totalDocs, totalUsers]
